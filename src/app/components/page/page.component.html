<main class="max-w-screen-md mx-auto py-8">
  @if (page(); as p) {
    @if (p.title) {
      <h1 class="text-4xl font-bold mb-4">{{ p.title }}</h1>
    }
    @if (p.description) {
      <p class="mb-6">{{ p.description }}</p>
    }

    <div class="space-y-8">
      @for (item of blocks(); track $index) {
        <ng-container *ngComponentOutlet="item.component; inputs: item.inputs" />
      }
    </div>
  } @else {
    <p class="text-gray-600">Page not found.</p>
  }
</main>
