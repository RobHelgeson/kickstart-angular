@if (heading()) {
  <h2 class="text-3xl font-bold mb-2">{{ heading() }}</h2>
}
@if (subtitle()) {
  <p class="text-gray-600 mb-6">{{ subtitle() }}</p>
}

@if (faqs().length === 0) {
  <p class="text-gray-600">No FAQs published yet.</p>
} @else {
  @for (faq of faqs(); track faq.uid) {
    <app-faq-content-stack-connector [faq]="faq" />
  }
}
